<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDMS — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden; padding: 1rem;
    }
    body::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 50%, rgba(37,99,235,.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 20%, rgba(124,58,237,.1) 0%, transparent 60%);
    }
    .register-container { width: 100%; max-width: 520px; position: relative; z-index: 1; }
    .brand-header { text-align: center; margin-bottom: 1.5rem; }
    .brand-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #fff; margin-bottom: .75rem;
      box-shadow: 0 8px 25px rgba(37,99,235,.4);
    }
    .brand-header h1 { font-size: 1.4rem; font-weight: 800; color: #fff; margin: 0; }
    .brand-header p  { color: #94a3b8; font-size: .85rem; margin: .25rem 0 0; }
    .auth-card {
      background: rgba(30,41,59,.8);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px; padding: 2rem;
      backdrop-filter: blur(20px);
    }
    .auth-card h2 { font-size: 1.1rem; font-weight: 700; color: #f1f5f9; margin-bottom: .25rem; }
    .auth-card .sub { color: #94a3b8; font-size: .85rem; margin-bottom: 1.5rem; }
    .form-label { color: #cbd5e1; font-size: .85rem; font-weight: 500; }
    .form-control, .form-select {
      background: rgba(15,23,42,.6);
      border: 1.5px solid rgba(255,255,255,.1);
      color: #f1f5f9; border-radius: 10px;
      padding: .65rem .875rem; font-size: .875rem;
    }
    .form-control:focus, .form-select:focus {
      background: rgba(15,23,42,.8);
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.2);
      color: #f1f5f9;
    }
    .form-control::placeholder { color: #475569; }
    .form-select option { background: #1e293b; }
    .section-divider {
      border-color: rgba(255,255,255,.1); margin: 1.25rem 0 1rem;
    }
    .section-label {
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1.2px; color: #475569; margin-bottom: .75rem;
    }
    .btn-register {
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border: none; color: #fff;
      padding: .75rem; border-radius: 10px;
      font-weight: 600; font-size: .9rem;
      width: 100%; transition: all .2s;
    }
    .btn-register:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(37,99,235,.4); color: #fff; }
    .btn-register:disabled { opacity: .7; transform: none; }
    .divider { border-color: rgba(255,255,255,.1); margin: 1.5rem 0; }
    .link-muted { color: #94a3b8; font-size: .85rem; }
    .link-muted a { color: #60a5fa; text-decoration: none; }
    .link-muted a:hover { color: #93c5fd; }
    .alert-error {
      background: rgba(220,38,38,.15); border: 1px solid rgba(248,113,113,.2);
      color: #fca5a5; border-radius: 10px; font-size: .85rem; padding: .75rem 1rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
<div class="register-container">
  <div class="brand-header">
    <div class="brand-logo"><i class="bi bi-truck"></i></div>
    <h1>LDMS</h1>
    <p>Local Delivery Management System</p>
  </div>

  <div class="auth-card">
    <h2>Create Seller Account</h2>
    <p class="sub">Register to start managing your deliveries</p>

    <div id="alert-box"></div>

    <form id="register-form">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name *</label>
          <input type="text" id="name" class="form-control" placeholder="Your full name" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" id="phone" class="form-control" placeholder="07xx-xxx-xxxx">
        </div>
        <div class="col-12">
          <label class="form-label">Email Address *</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Password *</label>
          <input type="password" id="password" class="form-control" placeholder="Min. 8 characters" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Confirm Password *</label>
          <input type="password" id="password_confirmation" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>

      <hr class="section-divider">
      <p class="section-label"><i class="bi bi-shop me-1"></i>Business Info (optional)</p>

      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Business Name</label>
          <input type="text" id="business_name" class="form-control" placeholder="Your shop or business name">
        </div>
        <div class="col-12">
          <label class="form-label">Business Address</label>
          <input type="text" id="business_address" class="form-control" placeholder="Pickup / business location">
        </div>
      </div>

      <button type="submit" class="btn btn-register mt-4" id="reg-btn">
        <i class="bi bi-person-plus me-2"></i>Create Account
      </button>
    </form>

    <hr class="divider">
    <p class="text-center link-muted mb-0">
      Already have an account? <a href="index.html">Sign in</a>
    </p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
  document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    const alertBox = document.getElementById('alert-box');
    alertBox.innerHTML = '';

    const pass = document.getElementById('password').value;
    if (pass !== document.getElementById('password_confirmation').value) {
      alertBox.innerHTML = `<div class="alert-error"><i class="bi bi-exclamation-circle me-2"></i>Passwords do not match.</div>`;
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Creating account...';

    try {
      const res = await POST('/register', {
        name:                  document.getElementById('name').value,
        email:                 document.getElementById('email').value,
        phone:                 document.getElementById('phone').value,
        password:              pass,
        password_confirmation: pass,
        business_name:         document.getElementById('business_name').value,
        business_address:      document.getElementById('business_address').value,
      });
      Auth.setAuth(res.token, res.user);
      window.location.href = 'pages/seller.html';
    } catch (err) {
      const msg = err.errors ? Object.values(err.errors).flat().join(' ') : (err.message || 'Registration failed.');
      alertBox.innerHTML = `<div class="alert-error"><i class="bi bi-exclamation-circle me-2"></i>${msg}</div>`;
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-person-plus me-2"></i>Create Account';
    }
  });
</script>
</body>
</html>
